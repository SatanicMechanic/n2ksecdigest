version: 2

# Cooldown mitigates supply-chain attacks: a new release must "age" 3 days
# before Dependabot proposes the bump. If a compromised version is caught
# and yanked within that window, the malicious release never reaches our PRs.

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
    commit-message:
      prefix: "ci"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
    commit-message:
      prefix: "deps"
