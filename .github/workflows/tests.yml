name: Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - 'state.json'
      - 'kev_cache.json'
      - 'last_run.txt'
      - 'README.md'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          python-version: '3.12'
      - run: uv venv
      - run: uv pip install -r requirements.txt -r requirements-dev.txt
      - run: uv run pytest -q
