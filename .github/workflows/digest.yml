name: Need to Know

on:
  schedule:
    # 10:55 UTC = 03:55 PDT (UTC-7) / 02:55 PST (UTC-8), weekdays only
    - cron: '55 10 * * 1-5'
    # 22:55 UTC = 15:55 PDT / 14:55 PST — catches breaking news; skips if morning already sent
    - cron: '55 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Set up uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9  # v9.0.0
        with:
          enable-cache: true
          python-version: '3.12'

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r requirements.txt

      - name: Restore digest state
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: state.json
          key: digest-state-${{ github.run_id }}
          restore-keys: digest-state-

      - name: Run digest
        env:
          # Primary LLM provider (defaults to xAI/Grok). To switch: set the
          # LLM_PROVIDER + LLM_MODEL repo variables and add that provider's
          # key secret below. LLM_BASE_URL/LLM_API_KEY_ENV are only needed for
          # a provider not in config.PROVIDERS.
          LLM_PROVIDER:      ${{ vars.LLM_PROVIDER }}
          LLM_MODEL:         ${{ vars.LLM_MODEL }}
          LLM_BASE_URL:      ${{ vars.LLM_BASE_URL }}
          LLM_API_KEY_ENV:   ${{ vars.LLM_API_KEY_ENV }}
          LLM_EXTRA:         ${{ vars.LLM_EXTRA }}
          XAI_API_KEY:       ${{ secrets.XAI_API_KEY }}
          MISTRAL_API_KEY:   ${{ secrets.MISTRAL_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          GH_MODELS_TOKEN:   ${{ secrets.GH_MODELS_TOKEN }}
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          DIGEST_TO_EMAIL:   ${{ vars.DIGEST_TO_EMAIL }}
          DIGEST_FROM_EMAIL: ${{ vars.DIGEST_FROM_EMAIL }}
          BRAVE_API_KEY:     ${{ secrets.BRAVE_API_KEY }}
          BRAVE_GOGGLES:     ${{ vars.BRAVE_GOGGLES }}
        run: uv run python digest.py

      - name: Save digest state
        if: always()
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: state.json
          key: digest-state-${{ github.run_id }}
